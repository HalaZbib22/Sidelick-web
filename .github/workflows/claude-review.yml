name: Claude Code Review

# Auto-review every PR targeting staging (develop) or production (main).
# Claude summarizes what changed, judges whether the code is sound and well
# organized, then submits a formal GitHub review (APPROVE / REQUEST_CHANGES).
#
# The MERGE GATE is this job's pass/fail status, not the approval itself:
# a final step reads Claude's latest review and fails the job when changes are
# requested (or when no approval was posted). Make "AI review" a required status
# check on develop/main and a red run hard-blocks merge — reliable and free on
# public repos, no bot-approval settings needed.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]

# Supersede an in-flight review when the PR gets new commits.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Read,Grep,Glob"'
          prompt: |
            You are the automated code reviewer for the Sidelick repo
            (${{ github.repository }}). Review pull request #${{ github.event.pull_request.number }}
            and decide whether it should be merged.

            Steps:
            1. Get the diff with `gh pr diff ${{ github.event.pull_request.number }}`.
            2. Use Read / Grep / Glob on the surrounding files as needed to understand
               context — how the changed code is called, what it depends on, and whether
               it fits the existing structure.
            3. Write a concise review with these sections:
               - **What changed**: plain-language summary of the diff and what the new or
                 changed code actually does. Describe behavior, not just file names.
               - **Assessment**: Is the change logical and does it make sense for what it
                 claims to do? Is the code well organized — sensible naming, no needless
                 duplication, placed in the right module, consistent with existing
                 patterns? Call out any correctness, security, edge-case, or clarity
                 concerns. If it's clean, say so briefly.
            4. Decide a verdict:
               - APPROVE if the change is sound, logical, and well organized with no
                 blocking issues.
               - REQUEST_CHANGES if there are blocking problems: bugs, security issues,
                 broken or unclear logic, poor organization, or anything that shouldn't
                 merge as-is. List exactly what to fix, specific and actionable.
               - When genuinely unsure, prefer REQUEST_CHANGES and explain what you'd need
                 to be confident. Do not approve on a guess.
            5. Submit the verdict as a FORMAL GitHub review (not a plain comment). You MUST
               run exactly one of these — it is what gates the merge:
               - Approve:
                 `gh pr review ${{ github.event.pull_request.number }} --approve --body "<your markdown review>"`
               - Request changes:
                 `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<your markdown review>"`
            6. End the review body with a single bold verdict line, e.g.
               `**Verdict: Approved — safe to merge.**` or
               `**Verdict: Changes requested.**`

            Keep it tight and specific — no filler. Only run the read-only commands above
            and the single `gh pr review` call for your verdict.

      # Gate: pass only if Claude's latest review on this PR is APPROVED.
      # CHANGES_REQUESTED, or a missing review (action failed to post), fails the job.
      - name: Enforce review verdict
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          state=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json reviews \
            --jq '[.reviews[] | select(.author.login=="github-actions")] | last | .state // "NONE"')
          echo "Latest Claude review state: $state"
          if [ "$state" = "APPROVED" ]; then
            echo "✅ Approved — merge allowed."
            exit 0
          fi
          echo "❌ Not approved (state=$state) — blocking merge. See Claude's review on the PR."
          exit 1
