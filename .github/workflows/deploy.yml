name: Deploy to Server via SSH

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  REGISTRY_IMAGE: sidelick

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # Build frontend and backend in parallel using matrix would be ideal,
      # but we'll use background jobs for parallelization
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: ${{ env.REGISTRY_IMAGE }}-frontend:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: ${{ env.REGISTRY_IMAGE }}-backend:latest
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Pull and save PostgreSQL Image
        run: |
          docker pull postgres:16-alpine
          docker save postgres:16-alpine -o /tmp/postgres-image.tar

      # Compress images for faster transfer
      - name: Compress Docker images
        run: |
          pigz -9 /tmp/frontend-image.tar &
          pigz -9 /tmp/backend-image.tar &
          pigz -9 /tmp/postgres-image.tar &
          wait

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/frontend-image.tar.gz
            /tmp/backend-image.tar.gz
            /tmp/postgres-image.tar.gz
          retention-days: 1
          compression-level: 0  # Already compressed

  deploy:
    needs: build-images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Create deployment directory on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "mkdir -p /tmp/sidelick-deploy /opt/sidelick"

      # Transfer compressed images in parallel for faster upload
      - name: Copy Docker images to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -C -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT || 22 }} /tmp/frontend-image.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/sidelick-deploy/ &
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -C -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT || 22 }} /tmp/backend-image.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/sidelick-deploy/ &
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -C -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT || 22 }} /tmp/postgres-image.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/sidelick-deploy/ &
          wait

      - name: Copy application files to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT || 22 }} docker-compose.yml ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/opt/sidelick/ &
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT || 22 }} schema.sql ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/opt/sidelick/ &
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT || 22 }} .env.docker.example ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/opt/sidelick/ &
          wait

      - name: Create .env.docker file on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/sidelick

            # Create .env.docker file from GitHub Secrets
            cat > .env.docker << 'EOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN || '7d' }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY || '' }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY || '' }}
            VAPID_SUBJECT=${{ secrets.VAPID_SUBJECT || 'mailto:support@sidelick.app' }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY || '' }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY || '' }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET || '' }}
            EOF

            echo ".env.docker file created successfully"

      - name: Deploy with Docker Compose via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            echo "Decompressing Docker images..."
            cd /tmp/sidelick-deploy
            pigz -d frontend-image.tar.gz &
            pigz -d backend-image.tar.gz &
            pigz -d postgres-image.tar.gz &
            wait

            echo "Loading Docker images..."
            docker load -i frontend-image.tar &
            docker load -i backend-image.tar &
            docker load -i postgres-image.tar &
            wait

            echo "Cleaning up image files..."
            rm -f /tmp/sidelick-deploy/*.tar

            echo "Navigating to application directory..."
            cd /opt/sidelick

            echo "Verifying .env.docker file exists..."
            if [ ! -f .env.docker ]; then
              echo "ERROR: .env.docker not found after creation!"
              exit 1
            fi

            echo ".env.docker file verified"

            echo "Stopping existing containers..."
            docker compose --env-file .env.docker down || true

            echo "Starting new containers..."
            docker compose --env-file .env.docker up -d

            echo "Waiting for services to be healthy..."
            sleep 10

            echo "Checking container status..."
            docker compose --env-file .env.docker ps

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment completed successfully!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/sidelick
            echo "Checking if all services are running..."
            docker compose --env-file .env.docker ps

            echo "Checking backend health..."
            docker compose --env-file .env.docker logs backend --tail=50

            echo "Checking frontend health..."
            docker compose --env-file .env.docker logs frontend --tail=50
