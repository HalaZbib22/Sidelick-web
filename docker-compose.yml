version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sidelick-postgres
    environment:
      POSTGRES_DB: sidelick
      POSTGRES_USER: sidelick
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidelick"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sidelick-network
    restart: unless-stopped

  # Backend (Express API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sidelick-backend
    environment:
      PORT: 4000
      DATABASE_URL: postgres://sidelick:${POSTGRES_PASSWORD:-changeme}@postgres:5432/sidelick
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: production
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:support@sidelick.app}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sidelick-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sidelick-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - sidelick-network
    restart: unless-stopped

networks:
  sidelick-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local